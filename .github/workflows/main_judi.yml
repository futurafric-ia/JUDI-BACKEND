# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - judi

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://judibot.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_f720b7f6ba644025be2d902f287c167d }}
        password: ${{ secrets.AzureAppService_ContainerPassword_05440c34485b4a74a02e4fb9cc79e4de }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: judibot.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_f720b7f6ba644025be2d902f287c167d }}/judibot:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'judi'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_4c37c35d20804fe0bca38f0dd37934de }}
        images: 'judibot.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_f720b7f6ba644025be2d902f287c167d }}/judibot:${{ github.sha }}'