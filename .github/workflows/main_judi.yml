# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - judi

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://judibot.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_3af73ca4b42d491b90b9025dd61606db }}
        password: ${{ secrets.AzureAppService_ContainerPassword_e8905e5b43f44a6bb6aed44626d22a77 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: judibot.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_3af73ca4b42d491b90b9025dd61606db }}/judibot/:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'judi'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_d36c10ad315e45febcccc3ad9e084ce9 }}
        images: 'judibot.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_3af73ca4b42d491b90b9025dd61606db }}/judibot/:${{ github.sha }}'